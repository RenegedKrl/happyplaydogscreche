<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;800&display=swap');
  body { margin:0; width:1080px; height:1350px; background:#050505; color:#fff; font-family:'Manrope', sans-serif; overflow:hidden; position:relative; }
  .glow1 { position:absolute; width:1200px; height:1200px; background:radial-gradient(circle, rgba(10,101,10,0.4) 0%, transparent 60%); top:-300px; right:-300px; }
  .glow2 { position:absolute; width:1000px; height:1000px; background:radial-gradient(circle, rgba(255,199,0,0.15) 0%, transparent 60%); bottom:-200px; left:-300px; }
  .grid { position:absolute; inset:0; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 50px 50px; }
  .header { padding: 100px 100px 60px; position:relative; z-index:10; }
  .badge { display:inline-block; border: 1px solid rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 40px; font-size: 22px; font-weight: 600; letter-spacing: 4px; margin-bottom: 50px; text-transform:uppercase; color:#ffc700;}
  .title { font-size: 120px; font-weight: 800; line-height: 0.95; letter-spacing: -5px; margin-bottom: 25px;}
  .subtitle { font-size: 32px; font-weight: 200; color: rgba(255,255,255,0.6); max-width:800px; line-height:1.4;}

  /* === MacBook mockup === */
  .laptop-wrap {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    width: 860px;
  }

  /* Lid (tela) */
  .laptop-lid {
    width: 860px;
    background: linear-gradient(180deg, #2c2c2e 0%, #1c1c1e 100%);
    border-radius: 16px 16px 5px 5px;
    border: 3px solid #3a3a3c;
    box-shadow:
      0 0 0 1px #111,
      0 -30px 80px rgba(0,0,0,0.9),
      0 20px 60px rgba(0,0,0,0.8);
    padding: 12px 12px 7px 12px;
    box-sizing: border-box;
  }

  /* Câmera */
  .camera-bar {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
  }
  .camera-dot {
    width: 8px;
    height: 8px;
    background: #3a3a3c;
    border-radius: 50%;
  }

  /* Área de tela — overflow:hidden garante que o site fique DENTRO */
  .screen {
    width: 100%;
    /* Proporção 16:10 do MacBook */
    height: 524px;
    background: #000;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .screen-inner {
    width: 100%;
    height: 100%;
    background: url('../screenshots/1-desktop-full.png') top center / 100% auto no-repeat;
  }

  /* Base do laptop */
  .laptop-base {
    width: 940px;
    margin: 0 auto;
    height: 22px;
    background: linear-gradient(180deg, #3a3a3c 0%, #2c2c2e 100%);
    border-radius: 0 0 10px 10px;
    border: 2px solid #1a1a1a;
    border-top: none;
    position: relative;
  }
  .laptop-base::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 6px;
    background: #1c1c1e;
    border-radius: 0 0 8px 8px;
  }

  /* Sombra no chão */
  .laptop-shadow {
    width: 800px;
    height: 40px;
    margin: 0 auto;
    background: radial-gradient(ellipse, rgba(0,0,0,0.7) 0%, transparent 70%);
    border-radius: 50%;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="grid"></div><div class="glow1"></div><div class="glow2"></div>
<div class="header">
  <div class="badge">Case Study</div>
  <div class="title">Happy Play<br>Dogs.</div>
  <div class="subtitle">Design minimalista e de alta conversão para pet shops e creches.</div>
</div>
<div class="laptop-wrap">
  <div class="laptop-lid">
    <div class="camera-bar"><div class="camera-dot"></div></div>
    <div class="screen">
      <div class="screen-inner"></div>
    </div>
  </div>
  <div class="laptop-base"></div>
  <div class="laptop-shadow"></div>
</div>
</body>
</html>
