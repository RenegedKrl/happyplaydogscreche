<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; background:#000; color:#fff; font-family:'Manrope', sans-serif; overflow:hidden; position:relative; }

  .glow { position:absolute; width:1400px; height:1400px;
    background:radial-gradient(circle, rgba(10,101,10,0.25) 0%, transparent 50%);
    top:50%; left:50%; transform:translate(-50%,-50%); z-index:0; }
  .grid { position:absolute; inset:0; z-index:0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:60px 60px; }

  .center { position:relative; z-index:10; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; text-align:center; padding:100px; }

  .eyebrow { font-size:18px; font-weight:700; color:#0a650a; letter-spacing:5px; text-transform:uppercase; margin-bottom:40px;
    background:rgba(10,101,10,0.1); border:1px solid rgba(10,101,10,0.4); padding:14px 30px; border-radius:100px; }

  h1 { font-size:115px; font-weight:900; line-height:0.95; letter-spacing:-5px; margin-bottom:50px; }
  h1 em { font-style:normal; display:block; color:#0a650a; }

  .desc { font-size:28px; font-weight:300; color:rgba(255,255,255,0.7); margin-bottom:80px; max-width:750px; line-height:1.6; }

  .btn { background:#fff; color:#000; padding:38px 90px; border-radius:100px; font-size:30px; font-weight:800; text-decoration:none; display:inline-block; box-shadow: 0 20px 60px rgba(255,255,255,0.15), 0 0 0 1px rgba(255,255,255,0.1); }

  .social-line { position:absolute; bottom:70px; left:0; right:0; z-index:20; text-align:center;
    font-size:18px; font-weight:500; color:rgba(255,255,255,0.35); letter-spacing:1px; }
  .social-line strong { color:rgba(255,255,255,0.65); font-weight:700; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="grid"></div>
<div class="center">
  <div class="eyebrow">Para o seu negócio</div>
  <h1>Quer um site<br><em>assim também?</em></h1>
  <div class="desc">Criamos sites de alta conversão para negócios locais que querem crescer no digital. Do planejamento ao código, do design à entrega.</div>
  <div class="btn">Me manda uma mensagem 🚀</div>
</div>
<div class="social-line">Instagram &amp; Behance: <strong>@pinas.studio</strong></div>
</body>
</html>
