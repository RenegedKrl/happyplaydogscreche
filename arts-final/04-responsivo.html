<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;700;800;900&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { width:1080px; height:1350px; background:#020a05; color:#fff; font-family:'Manrope', sans-serif; overflow:hidden; position:relative; }

  /* Fundo */
  .glow-blue { position:absolute; width:800px; height:800px;
    background:radial-gradient(circle, rgba(0,74,173,0.2) 0%, transparent 60%);
    bottom:-100px; right:-100px; z-index:0; }
  .glow-green { position:absolute; width:900px; height:900px;
    background:radial-gradient(circle, rgba(10,101,10,0.2) 0%, transparent 55%);
    top:-100px; left:-100px; z-index:0; }
  .grid { position:absolute; inset:0; z-index:0;
    background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size:60px 60px; }

  /* Texto */
  .content { position:relative; z-index:20; padding: 90px 90px 0; }
  .tag { font-size:18px; font-weight:700; color:#ffc700; letter-spacing:4px; text-transform:uppercase; margin-bottom:25px; }
  h1 { font-size:95px; font-weight:900; line-height:0.95; letter-spacing:-4px; margin-bottom:35px; }
  h1 em { font-style:normal; color:#0a650a; }
  .desc { font-size:22px; font-weight:300; color:rgba(255,255,255,0.7); max-width:700px; line-height:1.7; }
  .slide-num { position:absolute; top:90px; right:90px; z-index:20; font-size:22px; font-weight:800; color:rgba(255,255,255,0.2); }

  /* Layout devices */
  .devices-area {
    position:absolute;
    bottom:150px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    width:900px;
    display:flex;
    align-items:flex-start;
    gap:30px;
  }

  /* MacBook à esquerda */
  .laptop-wrap { flex-shrink:0; }
  .laptop-lid {
    width:580px;
    background: linear-gradient(170deg, #2c2c2e, #1c1c1e);
    border-radius:14px 14px 4px 4px;
    border:2px solid #3a3a3c;
    box-shadow: 0 0 0 1px #0a0a0a, 0 30px 80px rgba(0,0,0,0.95);
    padding:10px 10px 6px;
  }
  .camera-row { width:100%; display:flex; justify-content:center; margin-bottom:6px; }
  .camera-dot { width:6px; height:6px; background:#2a2a2c; border-radius:50%; }
  .laptop-screen {
    width:100%; height:330px;
    background:#000; border-radius:4px;
    overflow:hidden; position:relative;
  }
  .laptop-content {
    position:absolute; top:0; left:0; right:0; bottom:0;
    background: url('../screenshots/1-desktop-full.png') top center / 100% auto no-repeat;
    background-color:#f5f0e8;
  }
  .laptop-base {
    width:610px; margin:0 auto; height:14px;
    background:linear-gradient(180deg,#3a3a3c,#28282a);
    border-radius:0 0 6px 6px; border:2px solid #1a1a1a; border-top:none;
  }

  /* Phone à direita */
  .phone-wrap { flex-shrink:0; }
  .phone-body {
    width:190px;
    background: linear-gradient(170deg, #2a2a2c, #1a1a1c);
    border-radius:36px;
    border:3px solid #3c3c3e;
    box-shadow: 0 0 0 1px #0a0a0a, 0 30px 70px rgba(0,0,0,0.95);
    padding:10px;
  }
  .phone-notch { width:64px; height:20px; background:#1a1a1c; border-radius:0 0 12px 12px; margin:0 auto 8px; }
  .phone-screen {
    width:100%; height:370px;
    background:#000; border-radius:22px;
    overflow:hidden; position:relative;
  }
  .phone-content {
    position:absolute; top:0; left:0; right:0; bottom:0;
    background: url('../screenshots/2-mobile-menu-fechado-full.png') top center / 100% auto no-repeat;
    background-color:#f5f0e8;
  }
  .phone-btn { width:30px; height:4px; background:#2a2a2c; border-radius:2px; margin:8px auto 0; }

  /* Badges na base */
  .badges-row { position:absolute; bottom:80px; left:90px; right:90px; z-index:20; display:flex; gap:16px; }
  .badge-item { display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
    border-radius:100px; padding:18px 28px; backdrop-filter:blur(12px); }
  .b-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .b-text { font-size:18px; font-weight:600; }
</style>
</head>
<body>
<div class="glow-green"></div>
<div class="glow-blue"></div>
<div class="grid"></div>
<div class="slide-num">4 / 6</div>

<div class="content">
  <div class="tag">Responsividade</div>
  <h1>100%<br><em>Adaptável</em></h1>
  <div class="desc">O mesmo site que impacta no desktop converte no celular. Navegação mobile redesenhada com menu hamburger, barra de ações fixas e WhatsApp flutuante.</div>
</div>

<div class="devices-area">
  <div class="laptop-wrap">
    <div class="laptop-lid">
      <div class="camera-row"><div class="camera-dot"></div></div>
      <div class="laptop-screen">
        <div class="laptop-content"></div>
      </div>
    </div>
    <div class="laptop-base"></div>
  </div>

  <div class="phone-wrap">
    <div class="phone-body">
      <div class="phone-notch"></div>
      <div class="phone-screen">
        <div class="phone-content"></div>
      </div>
      <div class="phone-btn"></div>
    </div>
  </div>
</div>

<div class="badges-row">
  <div class="badge-item"><div class="b-dot" style="background:#0a650a;"></div><div class="b-text">Desktop</div></div>
  <div class="badge-item"><div class="b-dot" style="background:#ffc700;"></div><div class="b-text">Mobile</div></div>
  <div class="badge-item"><div class="b-dot" style="background:#004aad;"></div><div class="b-text">Tablet</div></div>
</div>
</body>
</html>
